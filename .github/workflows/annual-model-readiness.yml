name: Annual Model Readiness

on:
  push:
    branches: [main]
    paths:
      - "scripts/build_partial_window_artifacts.py"
      - "data/lake/**"
      - "data/processed/fixtures.csv"
      - "data/processed/player_matches.csv"
      - "simulator/**"
      - "scripts/build_simulator_calibration.py"
      - "scripts/run_calibrated_match_simulation.py"
      - "scripts/export_simulation_audit.py"
      - "scripts/build_replay_broadcast.py"
      - "tests/test_simulator.py"
      - "tests/test_calibrated_simulator.py"
      - "web/src/replay.js"
      - "web/src/replay.css"
      - "web/src/replay-entry.js"
      - "web/index.html"
      - ".github/workflows/annual-model-readiness.yml"
  schedule:
    - cron: "47 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: annual-model-readiness
  cancel-in-progress: true

jobs:
  readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install pandas numpy pytest

      - name: Build partial windows and role evidence
        run: python scripts/build_partial_window_artifacts.py

      - name: Derive observed World Cup calibration targets
        run: python scripts/build_simulator_calibration.py

      - name: Test simulator engines
        env:
          PYTHONPATH: .
        run: pytest -q tests/test_simulator.py tests/test_calibrated_simulator.py

      - name: Run 10000 calibrated matches
        env:
          PYTHONPATH: .
        run: python scripts/run_calibrated_match_simulation.py

      - name: Export auditable 10000-match ledger
        env:
          PYTHONPATH: .
        run: python scripts/export_simulation_audit.py

      - name: Generate narrated probabilistic replay
        run: python scripts/build_replay_broadcast.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate 2D broadcast interface
        working-directory: web
        run: |
          npm config set registry https://registry.npmjs.org/
          npm install --no-audit --no-fund
          npm run build

      - name: Archive calibrated simulator outputs
        uses: actions/upload-artifact@v4
        with:
          name: calibrated-simulator-broadcast-${{ github.run_id }}
          path: |
            data/simulations/calibration
            data/simulations/calibrated_v0_2
            artifacts/simulation_audit
            web/public/data/replay_package.json
            web/dist
          retention-days: 30
          if-no-files-found: error

      - name: Publish readiness, simulation and replay
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "synthetic-xi-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/model_readiness data/simulations/calibration data/simulations/calibrated_v0_2 web/public/data/replay_package.json
          if git diff --cached --quiet; then
            echo "No readiness, simulation or replay changes to publish"
          else
            git commit -m "data: update calibrated simulation and replay broadcast"
            git fetch origin main
            git rebase origin/main
            git push origin HEAD:main
          fi
