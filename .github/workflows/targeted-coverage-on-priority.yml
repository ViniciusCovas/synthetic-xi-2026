name: Targeted Coverage on Priority Update

on:
  push:
    branches: [main]
    paths:
      - "data/model_readiness/coverage_priority_fixtures.csv"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: adaptive-annual-player-extraction
  cancel-in-progress: false

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Restore resumable raw cache
        uses: actions/cache@v4
        with:
          path: data/raw/adaptive_annual
          key: targeted-priority-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            targeted-priority-${{ runner.os }}-
            targeted-annual-${{ runner.os }}-
            adaptive-annual-${{ runner.os }}-
      - name: Install dependencies
        run: pip install pandas requests
      - name: Extract priority coverage fixtures
        env:
          PYTHONPATH: .
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          API_MAX_REQUESTS_PER_MINUTE: "190"
          MAX_NETWORK_REQUESTS: "2800"
          MIN_DAILY_REQUESTS_REMAINING: "600"
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: python scripts/run_targeted_coverage_extraction.py
      - name: Analyze accumulated extraction quality
        if: ${{ always() }}
        run: python scripts/analyze_adaptive_extraction.py
      - name: Publish priority coverage batch
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "synthetic-xi-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/lake data/audits
          if git diff --cached --quiet; then
            echo "No priority coverage changes to publish"
          else
            git commit -m "data: publish priority coverage extraction"
            git fetch origin main
            git rebase origin/main
            git push origin HEAD:main
          fi
