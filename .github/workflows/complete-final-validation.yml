name: Complete Final Validation v1.1

on:
  pull_request:
    paths:
      - simulator/complete_final.py
      - simulator/complete_final_monte_carlo.py
      - simulator/validation.py
      - scripts/install_complete_final_bundle.py
      - scripts/install_complete_final_bundle_v1_1.py
      - scripts/patch_complete_final_rules_v1_1.py
      - scripts/scientific/build_complete_final_v1_1_engineering_snapshot.py
      - scripts/scientific/validate_complete_final.py
      - tests/test_complete_final.py
      - tests/test_complete_final_rules_v1_1.py
      - config/complete_final_rules_fix_v1_1.json
      - COMPLETE_FINAL_RULES_FIX_V1_1.md
      - .github/workflows/complete-final-validation.yml
  push:
    branches: [main]
    paths:
      - simulator/complete_final.py
      - simulator/complete_final_monte_carlo.py
      - simulator/validation.py
      - scripts/install_complete_final_bundle_v1_1.py
      - scripts/patch_complete_final_rules_v1_1.py
      - scripts/scientific/build_complete_final_v1_1_engineering_snapshot.py
      - tests/test_complete_final_rules_v1_1.py
      - config/complete_final_rules_fix_v1_1.json
      - COMPLETE_FINAL_RULES_FIX_V1_1.md
      - .github/workflows/complete-final-validation.yml
  workflow_dispatch:
    inputs:
      simulations:
        description: Neutral engineering simulations for v1.1
        required: false
        default: "1000"

permissions:
  contents: read

concurrency:
  group: complete-final-validation-v1-1-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PYTHONPATH: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pandas numpy matplotlib

      - name: Materialize reviewed source and apply preregistered v1.1 rules fix
        run: python scripts/install_complete_final_bundle_v1_1.py

      - name: Compile complete-final modules
        run: |
          python -m py_compile simulator/complete_final.py
          python -m py_compile simulator/complete_final_monte_carlo.py
          python -m py_compile simulator/validation.py
          python -m py_compile scripts/run_complete_final_simulation.py
          python -m py_compile scripts/scientific/validate_complete_final.py
          python -m py_compile scripts/scientific/build_complete_final_v1_1_engineering_snapshot.py

      - name: Run focused v1 and v1.1 rules tests
        run: pytest -q tests/test_complete_final.py tests/test_complete_final_rules_v1_1.py

      - name: Build neutral v1.1 engineering evidence
        env:
          INPUT_SIMULATIONS: ${{ inputs.simulations }}
        run: |
          if [ -n "${INPUT_SIMULATIONS:-}" ]; then
            N="$INPUT_SIMULATIONS"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            N=500
          else
            N=1000
          fi
          python scripts/scientific/build_complete_final_v1_1_engineering_snapshot.py --simulations "$N"

      - name: Verify engineering evidence
        run: |
          test -s data/model_readiness/complete_final_rules_fix_v1_1_status.json
          test -s data/simulations/complete_final_v1_1/engineering_validation_snapshot.json
          python - <<'PY'
          import json
          from pathlib import Path
          p=Path('data/simulations/complete_final_v1_1/engineering_validation_snapshot.json')
          d=json.loads(p.read_text())
          assert d['engineering_gate_passed'] is True, d
          assert d['definitive_10000_executed'] is False, d
          PY

      - name: Upload v1.1 engineering audit package
        uses: actions/upload-artifact@v4
        with:
          name: complete-final-v1-1-engineering-${{ github.run_id }}
          path: |
            config/complete_final_rules_fix_v1_1.json
            data/model_readiness/complete_final_rules_fix_v1_1_status.json
            data/simulations/complete_final_v1_1/engineering_validation_snapshot.json
            COMPLETE_FINAL_RULES_FIX_V1_1.md
          retention-days: 90
