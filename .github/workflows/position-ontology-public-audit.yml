name: Position Ontology Public Audit

on:
  push:
    branches: [main]
    paths:
      - scripts/scientific/audit_position_ontology.py
      - data/reference/public_role_anchors_2026.csv
      - data/reference/public_performance_checks_2026.csv
      - .github/workflows/position-ontology-public-audit.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: position-ontology-public-audit
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PYTHONPATH: .
    steps:
      - name: Checkout complete repository state
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply null-safe formation hotfix
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/scientific/audit_position_ontology.py')
          text = path.read_text(encoding='utf-8')
          old = '''def normalize_formation(value: object) -> str:
              return str(value or "").strip().replace(" ", "")'''
          new = '''def normalize_formation(value: object) -> str:
              if pd.isna(value):
                  return ""
              return str(value).strip().replace(" ", "")'''
          if old not in text:
              raise SystemExit('Expected normalize_formation source block not found')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY

      - name: Validate audit source
        run: python -m py_compile scripts/scientific/audit_position_ontology.py

      - name: Run zero-network ontology audit
        id: ontology
        continue-on-error: true
        run: |
          rm -rf data/audits/position_ontology_v2
          mkdir -p data/audits/position_ontology_v2
          set +e
          python scripts/scientific/audit_position_ontology.py > data/audits/position_ontology_v2/execution.log 2>&1
          code=$?
          set -e
          echo "$code" > data/audits/position_ontology_v2/exit_code.txt
          tail -n 150 data/audits/position_ontology_v2/execution.log
          exit "$code"

      - name: Protect frozen simulation release
        if: always()
        run: |
          if git diff --name-only | grep -E '^data/simulations/identified_set_v1/'; then
            echo 'Frozen identified-set simulation changed unexpectedly.' >&2
            exit 1
          fi
          if git diff --name-only | grep -E '(^|/)real_best_xi_provisional\.csv$'; then
            echo 'Protected provisional Real XI changed unexpectedly.' >&2
            exit 1
          fi

      - name: Archive audit package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: position-ontology-public-audit-${{ github.run_id }}
          path: data/audits/position_ontology_v2
          retention-days: 90
          if-no-files-found: error

      - name: Publish audit outputs or diagnostics
        if: always()
        run: |
          set -euo pipefail
          git config user.name "synthetic-xi-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -f data/audits/position_ontology_v2/
          if git diff --cached --quiet; then
            echo 'No ontology outputs to publish.'
            exit 0
          fi
          git commit -m "science: publish public position ontology audit"
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            if git rebase -X theirs origin/main && git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 5))
          done
          exit 1

      - name: Enforce successful audit execution
        if: always()
        run: |
          code=$(cat data/audits/position_ontology_v2/exit_code.txt 2>/dev/null || echo 1)
          if [ "$code" != "0" ]; then
            echo "Position ontology audit failed with exit code $code" >&2
            exit "$code"
          fi
