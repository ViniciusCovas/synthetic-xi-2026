name: Bootstrap Complete Final Bundle

on:
  push:
    branches: [feat/complete-final-engine-v1]
    paths:
      - scripts/install_complete_final_bundle.py
      - .github/workflows/bootstrap-complete-final.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bootstrap-complete-final-engine-v1
  cancel-in-progress: true

jobs:
  install:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/complete-final-engine-v1
          fetch-depth: 0
          persist-credentials: true

      - name: Materialize reviewed implementation
        run: python scripts/install_complete_final_bundle.py

      - name: Compile generated Python
        run: |
          python -m py_compile simulator/complete_final.py
          python -m py_compile simulator/complete_final_monte_carlo.py
          python -m py_compile simulator/validation.py
          python -m py_compile scripts/run_complete_final_simulation.py
          python -m py_compile scripts/scientific/validate_complete_final.py

      - name: Commit implementation and remove bootstrap
        run: |
          set -euo pipefail
          rm scripts/install_complete_final_bundle.py
          rm .github/workflows/bootstrap-complete-final.yml
          git config user.name "synthetic-xi-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "feat: implement complete scientifically gated final engine"
          git push origin HEAD:feat/complete-final-engine-v1
