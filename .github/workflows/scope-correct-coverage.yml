name: Scope-Correct Coverage Audit

on:
  push:
    branches: [main]
    paths:
      - "scripts/scientific/build_scope_correct_coverage.py"
      - ".github/workflows/scope-correct-coverage.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: synthetic-xi-data-writer
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas numpy

      - name: Build scope-correct coverage
        run: python scripts/scientific/build_scope_correct_coverage.py

      - name: Publish audit outputs
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/audits/scope_correct_coverage
          if git diff --cached --quiet; then
            echo "No scope-correct audit changes to publish."
            exit 0
          fi
          git commit -m "science: publish scope-correct coverage audit"
          for attempt in 1 2 3; do
            git fetch origin main
            if git rebase origin/main && git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort || true
            sleep $((attempt * 5))
          done
          echo "Failed to publish scope-correct coverage after retries." >&2
          exit 1
