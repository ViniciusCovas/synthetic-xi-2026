name: Run Frozen Challenger Resolution Once

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: run-frozen-challenger-resolution-once
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pandas numpy requests matplotlib pytest
      - name: Resolve only the frozen challengers
        env:
          PYTHONPATH: .
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          API_SAFE_REQUESTS_PER_MINUTE: '120'
          MAX_NETWORK_REQUESTS: '50'
          MIN_DAILY_REQUESTS_REMAINING: '50'
          FIXTURE_BUNDLE_SIZE: '20'
          GITHUB_RUN_ID: challengers_${{ github.run_id }}
        run: bash scripts/scientific/run_frozen_challenger_resolution.sh
      - name: Upload audit package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frozen-challenger-resolution-${{ github.run_id }}
          path: |
            data/audits/selection_challenger_resolution
            data/audits/scope_correct_coverage
            data/model_readiness/selection_challenger_reconstructed_minutes.csv
            data/model_readiness/selection_sufficiency_status.json
            data/model_readiness/scientific_validation_status.json
            data/simulations/complete_final_v1
          retention-days: 90
          if-no-files-found: warn
