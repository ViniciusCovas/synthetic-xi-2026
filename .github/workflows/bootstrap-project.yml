name: Refresh World Cup 2026 Data

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/bootstrap-project.yml"
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: "1"

jobs:
  refresh:
    runs-on: ubuntu-latest
    concurrency:
      group: synthetic-xi-world-cup-2026
      cancel-in-progress: false

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Verify paid World Cup 2026 access
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          python - <<'PY'
          import os
          import requests

          response = requests.get(
              "https://v3.football.api-sports.io/leagues",
              params={"id": 1, "season": 2026},
              headers={"x-apisports-key": os.environ["API_FOOTBALL_KEY"]},
              timeout=60,
          )
          response.raise_for_status()
          payload = response.json()
          errors = payload.get("errors") or {}
          if errors:
              raise SystemExit(f"API-Football access error: {errors}")
          if not payload.get("response"):
              raise SystemExit("API-Football returned no World Cup 2026 competition record")
          print("World Cup 2026 access confirmed")
          print("Daily requests remaining:", response.headers.get("x-ratelimit-requests-remaining", "not reported"))
          PY

      - name: Generate live World Cup 2026 snapshot
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python scripts/refresh_2026.py

      - name: Run scientific tests
        run: pytest -q

      - name: Archive raw provider responses
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: api-football-raw-${{ github.run_id }}
          path: data/raw/api_football
          retention-days: 30
          if-no-files-found: warn

      - name: Publish generated scientific data
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "synthetic-xi-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/processed web/public/data
          if git diff --cached --quiet; then
            echo "No generated-data changes to publish"
          else
            git commit -m "data: update World Cup 2026 live snapshot"
            git push origin HEAD:main
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Validate production interface
        working-directory: web
        run: |
          npm install --no-audit --no-fund --package-lock=false
          npm run build
