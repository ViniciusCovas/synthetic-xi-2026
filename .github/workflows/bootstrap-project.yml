name: Bootstrap Synthetic XI 2026

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/bootstrap-project.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract validated project source
        shell: bash
        run: |
          cat .bootstrap/part* > /tmp/synthetic-xi-project.b64
          base64 --decode /tmp/synthetic-xi-project.b64 > /tmp/synthetic-xi-project.tar.gz
          tar -xzf /tmp/synthetic-xi-project.tar.gz -C "$GITHUB_WORKSPACE"
          rm -rf .bootstrap
          rm -f .github/workflows/bootstrap-project.yml

      - name: Publish source code
        shell: bash
        run: |
          git config user.name "synthetic-xi-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "feat: bootstrap Synthetic XI 2026 v0.3"
          git push

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate first live World Cup 2026 snapshot
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python scripts/refresh_2026.py

      - name: Run scientific tests
        run: pytest -q

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Validate production interface
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Archive raw provider responses
        uses: actions/upload-artifact@v4
        with:
          name: api-football-raw-${{ github.run_id }}
          path: data/raw/api_football
          retention-days: 30
          if-no-files-found: warn

      - name: Publish generated scientific data
        shell: bash
        run: |
          git add data/processed web/public/data
          git diff --cached --quiet || git commit -m "data: first World Cup 2026 snapshot"
          git push
