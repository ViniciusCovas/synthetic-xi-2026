name: Bootstrap Synthetic XI 2026

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Reconstruct validated project package
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/part* > /tmp/synthetic-xi-project.b64
          base64 --decode /tmp/synthetic-xi-project.b64 > /tmp/synthetic-xi-project.tar.gz
          gzip -t /tmp/synthetic-xi-project.tar.gz
          mkdir -p /tmp/synthetic-xi-source
          tar -xzf /tmp/synthetic-xi-project.tar.gz -C /tmp/synthetic-xi-source

          PROJECT_FILE="$(find /tmp/synthetic-xi-source -maxdepth 3 -type f -name pyproject.toml | head -n 1)"
          test -n "$PROJECT_FILE"
          PROJECT_ROOT="$(dirname "$PROJECT_FILE")"
          echo "Project root: $PROJECT_ROOT"

          rsync -a \
            --exclude='.git/' \
            --exclude='.github/workflows/' \
            --exclude='.pytest_cache/' \
            --exclude='__pycache__/' \
            --exclude='node_modules/' \
            --exclude='dist/' \
            "$PROJECT_ROOT/" "$GITHUB_WORKSPACE/"

          rm -rf "$GITHUB_WORKSPACE/.bootstrap"

      - name: Publish clean source code
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "synthetic-xi-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git status --short
          git diff --cached --quiet && { echo "No source changes found"; exit 1; }
          git commit -m "feat: bootstrap Synthetic XI 2026 v0.3"
          git push origin HEAD:main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate first live World Cup 2026 snapshot
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python scripts/refresh_2026.py

      - name: Run scientific tests
        run: pytest -q

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Validate production interface
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Archive raw provider responses
        uses: actions/upload-artifact@v4
        with:
          name: api-football-raw-${{ github.run_id }}
          path: data/raw/api_football
          retention-days: 30
          if-no-files-found: warn

      - name: Publish generated scientific data
        shell: bash
        run: |
          set -euo pipefail
          git add data/processed web/public/data
          git diff --cached --quiet || git commit -m "data: first World Cup 2026 snapshot"
          git push origin HEAD:main
