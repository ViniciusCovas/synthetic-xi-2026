name: Isolated Complete Final Validation 2000

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/validation-2000-trigger/**'

permissions:
  contents: write
  actions: read

concurrency:
  group: isolated-complete-final-validation-2000
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout frozen main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pandas numpy requests matplotlib pytest

      - name: Assert frozen upstream evidence
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          def load(path):
              return json.loads(Path(path).read_text(encoding='utf-8'))
          selection = load('data/model_readiness/selection_sufficiency_status.json')
          weather = load('data/context/world_cup_2026_weather_summary.json')
          events = load('data/context/world_cup_2026_event_benchmark_summary.json')
          engineering = load('data/simulations/complete_final_v1_1/engineering_validation_snapshot.json')
          rules = load('data/model_readiness/complete_final_rules_fix_v1_1_status.json')
          measurement = load('data/model_readiness/complete_final_yellow_card_measurement_v1_status.json')
          assert selection.get('unresolved_players') == 0
          assert selection.get('selection_sufficiency_gate_passed') is True
          assert weather.get('matches_in_record') == 104 and weather.get('weather_coverage') == 1.0
          assert events.get('fixtures_returned_with_bundle') == 104 and events.get('fixture_coverage') == 1.0
          assert engineering.get('engineering_gate_passed') is True and engineering.get('simulations') == 1000
          assert rules.get('status') == 'complete_final_rules_fix_v1_1_applied'
          assert measurement.get('status') == 'complete_final_yellow_card_measurement_v1_applied'
          PY

      - name: Re-evaluate core preflight from frozen evidence
        id: core
        env:
          PYTHONPATH: .
        shell: bash
        run: |
          set +e
          python scripts/scientific/validate_complete_final_preflight_v1_1.py
          code=$?
          set -e
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          test "$code" -eq 0

      - name: Execute isolated 2,000-match validation
        id: validation
        env:
          PYTHONPATH: .
        shell: bash
        run: |
          set +e
          python scripts/scientific/run_complete_final_preflight_validation.py
          code=$?
          set -e
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          echo "Validation exit code: $code"

      - name: Restore materialized source wrappers
        if: always()
        run: |
          git restore --worktree -- \
            simulator/complete_final.py \
            simulator/complete_final_monte_carlo.py \
            simulator/validation.py \
            scripts/run_complete_final_simulation.py \
            scripts/scientific/validate_complete_final.py \
            tests/test_complete_final.py \
            .github/workflows/complete-final-validation.yml \
            COMPLETE_FINAL_IMPLEMENTATION.md 2>/dev/null || true

      - name: Finalize gates
        if: always()
        env:
          PYTHONPATH: .
        shell: bash
        run: |
          set +e
          python scripts/scientific/finalize_complete_final_preflight.py
          python scripts/scientific/release_complete_final_when_ready.py --evaluate-only
          set -e

      - name: Upload audit package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: isolated-validation-2000-${{ github.run_id }}
          path: |
            data/model_readiness/complete_final_preflight_status.json
            data/model_readiness/complete_final_validation_2000_status.json
            data/simulations/complete_final_v1_1/validation_report.json
            data/simulations/complete_final_v1_1/validation_report.md
            data/simulations/complete_final_v1_1/validation_build.log
            data/simulations/complete_final_v1_1/release_gate_status.json
          retention-days: 90
          if-no-files-found: warn

      - name: Publish validation evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'synthetic-xi-bot'
          git config user.email 'actions@users.noreply.github.com'
          for path in \
            data/model_readiness/complete_final_preflight_status.json \
            data/model_readiness/complete_final_validation_2000_status.json \
            data/simulations/complete_final_v1_1/validation_report.json \
            data/simulations/complete_final_v1_1/validation_report.md \
            data/simulations/complete_final_v1_1/validation_build.log \
            data/simulations/complete_final_v1_1/release_gate_status.json; do
            if [[ -e "$path" ]]; then git add -- "$path"; fi
          done
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'science: record isolated 2000-match validation diagnostics'
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            if git rebase -X theirs origin/main && git push origin HEAD:main; then exit 0; fi
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 4))
          done
          exit 1

      - name: Enforce fail-closed outcome
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p=Path('data/model_readiness/complete_final_validation_2000_status.json')
          d=json.loads(p.read_text()) if p.exists() else {}
          print(json.dumps(d, indent=2))
          raise SystemExit(0 if d.get('validation_2000_passed') is True else 2)
          PY
