name: Structural Missingness Sensitivity

on:
  push:
    branches: [main]
    paths:
      - scripts/scientific/build_structural_missingness_sensitivity.py
      - scripts/scientific/run_structural_missingness_sensitivity_safe.py
      - .github/workflows/structural-missingness-sensitivity.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: structural-missingness-sensitivity
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pandas numpy

      - name: Materialize aggregate terminal evidence when progress file is absent
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import pandas as pd
          progress = Path('data/lake/direct_player_stats_progress.csv')
          residual_path = Path('data/model_readiness/cache_rebuild/truly_unresolved_player_fixture_pairs.csv')
          status_path = Path('data/audits/direct_residual_player_stats_status.json')
          if not progress.exists() and residual_path.exists() and status_path.exists():
              residual = pd.read_csv(residual_path, low_memory=False)
              residual['fixture_id'] = pd.to_numeric(residual['fixture_id'], errors='coerce')
              fixtures = sorted(set(residual['fixture_id'].dropna().astype(int)))
              status = json.loads(status_path.read_text(encoding='utf-8'))
              complete = (
                  int(status.get('terminal_fixtures', 0)) >= len(fixtures)
                  and int(status.get('remaining_unattempted_or_retryable_fixtures', 1)) == 0
              )
              if complete:
                  progress.parent.mkdir(parents=True, exist_ok=True)
                  pd.DataFrame({
                      'fixture_id': fixtures,
                      'attempts': 1,
                      'last_run_utc': status.get('generated_at_utc'),
                      'status': 'provider_endpoint_empty',
                      'target_players': 0,
                      'response_team_blocks': 0,
                      'response_player_items': 0,
                      'target_rows': 0,
                      'positive_target_rows': 0,
                      'network_calls': 0,
                      'error': 'materialized_from_complete_aggregate_direct_endpoint_status',
                  }).to_csv(progress, index=False)
          PY

      - name: Build structural missingness identified sets
        id: sensitivity
        continue-on-error: true
        run: |
          mkdir -p data/audits/structural_missingness
          set +e
          python scripts/scientific/run_structural_missingness_sensitivity_safe.py > data/audits/structural_missingness/execution.log 2>&1
          code=$?
          set -e
          echo "$code" > data/audits/structural_missingness/exit_code.txt
          tail -n 80 data/audits/structural_missingness/execution.log
          exit "$code"

      - name: Verify no final ranking was created
        if: always()
        run: |
          if git diff --name-only | grep -E '(^|/)(real_best_xi_provisional|final_rankings|synthetic_xi_vs_real_xi)\.csv$'; then
            echo 'Protected ranking output changed unexpectedly.' >&2
            exit 1
          fi

      - name: Publish sensitivity audit or diagnostics
        if: always()
        run: |
          set -euo pipefail
          git config user.name "synthetic-xi-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -f data/audits/structural_missingness/
          if git diff --cached --quiet; then
            echo "No sensitivity changes to publish."
            exit 0
          fi
          git commit -m "science: publish structural missingness identified sets"
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            if git rebase -X theirs origin/main && git push origin HEAD:main; then
              echo "Sensitivity audit published on attempt ${attempt}."
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 4))
          done
          echo "Failed to publish sensitivity audit." >&2
          exit 1

      - name: Enforce successful sensitivity analysis
        if: always()
        run: |
          code=$(cat data/audits/structural_missingness/exit_code.txt 2>/dev/null || echo 1)
          if [ "$code" != "0" ]; then
            echo "Sensitivity analysis failed with exit code $code" >&2
            exit "$code"
          fi
