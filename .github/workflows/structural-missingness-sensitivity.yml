name: Structural Missingness Sensitivity

on:
  push:
    branches: [main]
    paths:
      - scripts/scientific/build_structural_missingness_sensitivity.py
      - .github/workflows/structural-missingness-sensitivity.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: structural-missingness-sensitivity
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pandas numpy

      - name: Build structural missingness identified sets
        id: sensitivity
        continue-on-error: true
        run: |
          mkdir -p data/audits/structural_missingness
          set +e
          python scripts/scientific/build_structural_missingness_sensitivity.py > data/audits/structural_missingness/execution.log 2>&1
          code=$?
          set -e
          echo "$code" > data/audits/structural_missingness/exit_code.txt
          tail -n 80 data/audits/structural_missingness/execution.log
          exit "$code"

      - name: Verify no final ranking was created
        if: always()
        run: |
          if git diff --name-only | grep -E '(^|/)(real_best_xi_provisional|final_rankings|synthetic_xi_vs_real_xi)\.csv$'; then
            echo 'Protected ranking output changed unexpectedly.' >&2
            exit 1
          fi

      - name: Publish sensitivity audit or diagnostics
        if: always()
        run: |
          set -euo pipefail
          git config user.name "synthetic-xi-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -f data/audits/structural_missingness/
          if git diff --cached --quiet; then
            echo "No sensitivity changes to publish."
            exit 0
          fi
          git commit -m "science: publish structural missingness identified sets"
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            if git rebase -X theirs origin/main && git push origin HEAD:main; then
              echo "Sensitivity audit published on attempt ${attempt}."
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 4))
          done
          echo "Failed to publish sensitivity audit." >&2
          exit 1

      - name: Enforce successful sensitivity analysis
        if: always()
        run: |
          code=$(cat data/audits/structural_missingness/exit_code.txt 2>/dev/null || echo 1)
          if [ "$code" != "0" ]; then
            echo "Sensitivity analysis failed with exit code $code" >&2
            exit "$code"
          fi
