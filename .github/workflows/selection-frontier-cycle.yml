name: Selection Frontier Coverage Cycle

on:
  push:
    branches: [main]
    paths:
      - "scripts/build_selection_frontier.py"
      - "scripts/run_frontier_coverage_extraction.py"
      - ".github/workflows/selection-frontier-cycle.yml"
  schedule:
    - cron: "23 3,9,15,21 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: adaptive-annual-player-extraction
  cancel-in-progress: false

jobs:
  frontier:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Restore resumable raw cache
        uses: actions/cache@v4
        with:
          path: data/raw/adaptive_annual
          key: frontier-annual-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            frontier-annual-${{ runner.os }}-
            targeted-annual-${{ runner.os }}-
            adaptive-annual-${{ runner.os }}-
      - name: Install dependencies
        run: pip install pandas numpy requests
      - name: Build conservative selection frontier
        env:
          PYTHONPATH: .
        run: python scripts/build_selection_frontier.py
      - name: Extract only frontier coverage gaps
        env:
          PYTHONPATH: .
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          API_MAX_REQUESTS_PER_MINUTE: "190"
          MAX_NETWORK_REQUESTS: "2800"
          MIN_DAILY_REQUESTS_REMAINING: "600"
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: python scripts/run_frontier_coverage_extraction.py
      - name: Rebuild readiness after extraction
        if: ${{ always() }}
        env:
          PYTHONPATH: .
        run: |
          python scripts/build_partial_window_artifacts.py
          python scripts/build_exact_coverage_audit.py
          python scripts/validate_lateral_grid.py
          python scripts/resolve_eleven_roles.py
          python scripts/build_selection_frontier.py
      - name: Archive frontier cycle
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: selection-frontier-${{ github.run_id }}
          path: |
            data/model_readiness
            data/lake
            data/audits
            data/raw/adaptive_annual
          retention-days: 30
          if-no-files-found: warn
      - name: Publish frontier and extraction outputs
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "synthetic-xi-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/model_readiness data/lake data/audits
          if git diff --cached --quiet; then
            echo "No frontier or extraction changes to publish"
          else
            git commit -m "science: update selection frontier and targeted coverage"
            git fetch origin main
            git rebase origin/main
            git push origin HEAD:main
          fi
