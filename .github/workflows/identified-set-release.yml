name: Identified Set Release

on:
  push:
    branches: [main]
    paths:
      - scripts/scientific/build_identified_set_release.py
      - .github/workflows/identified-set-release.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: identified-set-release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pandas

      - name: Build identified-set release
        run: python scripts/scientific/build_identified_set_release.py

      - name: Verify protected point-ranking outputs are untouched
        run: |
          if git diff --name-only | grep -E '(^|/)(real_best_xi_provisional|final_rankings|synthetic_xi_vs_real_xi)\.csv$'; then
            echo 'Protected point-ranking output changed unexpectedly.' >&2
            exit 1
          fi

      - name: Publish identified-set release
        run: |
          set -euo pipefail
          git config user.name "synthetic-xi-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/releases/v1_0_identified_set/ paper/IDENTIFIED_SET_RESULTS.md
          if git diff --cached --quiet; then
            echo "No identified-set release changes to publish."
            exit 0
          fi
          git commit -m "release: publish Real XI identified set"
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            if git rebase -X theirs origin/main && git push origin HEAD:main; then
              echo "Identified-set release published on attempt ${attempt}."
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 4))
          done
          echo "Failed to publish identified-set release." >&2
          exit 1
