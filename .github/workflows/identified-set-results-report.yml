name: Identified Set Results Report

on:
  push:
    branches: [main]
    paths:
      - scripts/scientific/build_identified_set_results_report.py
      - .github/workflows/identified-set-results-report.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: identified-set-results-report
  cancel-in-progress: true

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONPATH: .
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build scientific result and mechanism audit
        run: python scripts/scientific/build_identified_set_results_report.py

      - name: Verify claim guardrails
        run: |
          test -f data/simulations/identified_set_v1/RESULTS_ES.md
          test -f data/simulations/identified_set_v1/publication_claims.json
          test ! -f data/simulations/identified_set_v1/final_rankings.csv

      - name: Publish result audit
        run: |
          set -euo pipefail
          git config user.name "synthetic-xi-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/simulations/identified_set_v1/RESULTS_ES.md \
                  data/simulations/identified_set_v1/publication_claims.json \
                  data/simulations/identified_set_v1/ambiguity_factor_effects.csv \
                  data/simulations/identified_set_v1/profile_gap_by_role.csv
          if git diff --cached --quiet; then
            echo "No result-audit changes to publish."
            exit 0
          fi
          git commit -m "science: publish simulation result and mechanism audit"
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            if git rebase -X theirs origin/main && git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 4))
          done
          exit 1
