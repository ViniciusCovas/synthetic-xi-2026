name: Ontology v3 Adjudication, Coverage and Team Freeze

on:
  push:
    branches: [definitive-real-vs-ai]
    paths:
      - scripts/scientific/promote_ontology_v3.py
      - scripts/scientific/build_final_candidate_coverage_v3.py
      - scripts/scientific/build_definitive_experiment_gate.py
      - scripts/scientific/build_definitive_teams.py
      - simulator/ai_xi_generator.py
      - .github/workflows/ontology-v3-review-packet.yml
      - DEFINITIVE_REAL_VS_AI_PROTOCOL.md
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: adjudicated-ontology-team-freeze
  cancel-in-progress: false

jobs:
  freeze:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
        with:
          ref: definitive-real-vs-ai
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install, compile and test
        run: |
          pip install -r requirements.txt pytest
          python -m py_compile scripts/scientific/promote_ontology_v3.py
          python -m py_compile scripts/scientific/build_final_candidate_coverage_v3.py
          python -m py_compile scripts/scientific/build_definitive_experiment_gate.py
          python -m py_compile scripts/scientific/build_definitive_teams.py
          python -m py_compile simulator/ai_xi_generator.py
          pytest -q tests/test_ai_xi_generator.py

      - name: Promote adjudicated roles and evaluate exact-window coverage
        run: |
          python scripts/scientific/promote_ontology_v3.py
          python scripts/scientific/build_final_candidate_coverage_v3.py
          python scripts/scientific/build_definitive_experiment_gate.py

      - name: Freeze one Real XI and one AI XI when authorized
        run: |
          if python - <<'PY'
          import json
          from pathlib import Path
          status = json.loads(Path('data/audits/definitive_experiment_v1/gate_status.json').read_text())
          raise SystemExit(0 if status.get('design_gate_passed') else 1)
          PY
          then
            python scripts/scientific/build_definitive_teams.py
            python scripts/scientific/build_definitive_experiment_gate.py
          else
            echo 'Design gate remains blocked; no definitive team files were produced.'
          fi

      - name: Protect frozen exploratory release
        run: |
          if git diff --name-only | grep -E '^data/simulations/identified_set_v1/'; then
            echo 'Frozen exploratory simulation changed unexpectedly.' >&2
            exit 1
          fi

      - name: Upload scientific state
        uses: actions/upload-artifact@v4
        with:
          name: adjudicated-coverage-team-freeze-${{ github.run_id }}
          path: |
            data/audits/position_ontology_v3/ontology_v3_status.json
            data/audits/position_ontology_v3/promoted_candidate_roles_uncovered.csv
            data/audits/position_ontology_v3/final_candidate_roles.csv
            data/audits/position_ontology_v3/final_candidate_coverage_unresolved.csv
            data/audits/position_ontology_v3/final_candidate_coverage_status.json
            data/audits/definitive_experiment_v1/
            data/definitive_experiment_v1/
          if-no-files-found: warn
          retention-days: 90

      - name: Publish reproducible gate outputs
        run: |
          set -euo pipefail
          git config user.name 'synthetic-xi-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -f data/audits/position_ontology_v3/ontology_v3_status.json
          git add -f data/audits/position_ontology_v3/promoted_candidate_roles_uncovered.csv
          git add -f data/audits/position_ontology_v3/final_candidate_roles.csv
          git add -f data/audits/position_ontology_v3/final_candidate_coverage_unresolved.csv
          git add -f data/audits/position_ontology_v3/final_candidate_coverage_status.json
          git add -f data/audits/definitive_experiment_v1/gate_status.json
          git add -f data/audits/definitive_experiment_v1/README.md
          if [ -d data/definitive_experiment_v1 ]; then
            git add -f data/definitive_experiment_v1/
          fi
          if git diff --cached --quiet; then
            echo 'No new gate outputs to publish.'
            exit 0
          fi
          git commit -m 'science: promote adjudicated ontology and evaluate team freeze'
          for attempt in 1 2 3 4 5; do
            git fetch origin definitive-real-vs-ai
            if git rebase -X theirs origin/definitive-real-vs-ai && git push origin HEAD:definitive-real-vs-ai; then
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 5))
          done
          exit 1
