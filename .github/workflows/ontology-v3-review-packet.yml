name: Ontology v3 Blind Review Packet

on:
  push:
    branches: [definitive-real-vs-ai]
    paths:
      - scripts/scientific/build_blind_position_review_packet_v3.py
      - scripts/scientific/evaluate_blind_position_review_v3.py
      - .github/workflows/ontology-v3-review-packet.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  packet:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PYTHONPATH: .
      V2_SNAPSHOT: 08276007a68a923294e0aea44fb2e8dbbd553021
    steps:
      - uses: actions/checkout@v4
        with:
          ref: definitive-real-vs-ai
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Restore public position anchors
        run: |
          mkdir -p data/audits/position_ontology_v2
          git show "$V2_SNAPSHOT:data/audits/position_ontology_v2/player_position_audit.csv" > data/audits/position_ontology_v2/audited_player_roles.csv

      - name: Rebuild primary roles and gated review packet
        run: |
          python -m py_compile scripts/scientific/audit_complete_lineups_v3.py
          python -m py_compile scripts/scientific/build_blind_position_review_packet_v3.py
          python -m py_compile scripts/scientific/evaluate_blind_position_review_v3.py
          python scripts/scientific/audit_complete_lineups_v3.py
          python scripts/scientific/build_blind_position_review_packet_v3.py
          python scripts/scientific/evaluate_blind_position_review_v3.py

      - name: Upload public reviewer package
        uses: actions/upload-artifact@v4
        with:
          name: ontology-v3-review-public-${{ github.run_id }}
          path: |
            data/audits/position_ontology_v3/lineup_completeness_status.json
            data/audits/position_ontology_v3/complete_lineup_primary_roles.csv
            data/audits/position_ontology_v3/blind_review/reviewer_a_form.csv
            data/audits/position_ontology_v3/blind_review/reviewer_b_form.csv
            data/audits/position_ontology_v3/blind_review/REVIEW_INSTRUCTIONS_PT.md
            data/audits/position_ontology_v3/blind_review/packet_manifest.json
            data/audits/position_ontology_v3/blind_review/blind_review_evaluation.json
            POSITION_ONTOLOGY_CODEBOOK_ES.md
          if-no-files-found: warn
          retention-days: 90

      - name: Upload internal answer key
        if: ${{ hashFiles('data/audits/position_ontology_v3/blind_review/answer_key_do_not_share_with_reviewers.csv') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ontology-v3-review-internal-${{ github.run_id }}
          path: data/audits/position_ontology_v3/blind_review/answer_key_do_not_share_with_reviewers.csv
          if-no-files-found: error
          retention-days: 90
