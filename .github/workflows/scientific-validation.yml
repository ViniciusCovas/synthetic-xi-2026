name: Scientific Validation Suite

on:
  push:
    branches: [main]
    paths:
      - "scripts/build_exact_coverage_audit.py"
      - "scripts/validate_lateral_grid.py"
      - "scripts/resolve_eleven_roles.py"
      - "scripts/build_selection_frontier.py"
      - "scripts/build_selection_sufficiency_gate.py"
      - "scripts/run_predictive_backtest.py"
      - "scripts/run_external_pre_tournament_holdout.py"
      - "scripts/tune_shared_tempo_and_run_v3.py"
      - "scripts/run_sensitivity_analysis.py"
      - "scripts/run_nested_uncertainty.py"
      - "scripts/build_scientific_status.py"
      - "scripts/build_final_release_package.py"
      - "scripts/build_scientific_exhibits.py"
      - "simulator/shared_tempo.py"
      - "tests/test_scientific_validation.py"
      - "data/reference/lateral_role_anchors.csv"
      - "data/lake/**"
      - "data/audits/annual_player_precheck.csv"
      - "data/audits/annual_player_competitions.csv"
      - "data/audits/exact_fixture_inventory.csv"
      - "data/processed/fixtures.csv"
      - "data/processed/player_matches.csv"
      - ".github/workflows/scientific-validation.yml"
  schedule:
    - cron: "47 3-13 19 7 *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scientific-validation-suite
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install scientific dependencies
        run: pip install pandas numpy pytest matplotlib
      - name: Rebuild data and selection gates
        env:
          PYTHONPATH: .
        run: |
          python scripts/build_partial_window_artifacts.py
          python scripts/build_exact_coverage_audit.py
          python scripts/validate_lateral_grid.py
          python scripts/resolve_eleven_roles.py
          python scripts/build_selection_frontier.py
          python scripts/build_selection_sufficiency_gate.py
      - name: Test scientific components
        env:
          PYTHONPATH: .
        run: pytest -q tests/test_simulator.py tests/test_calibrated_simulator.py tests/test_scientific_validation.py
      - name: Run predictive and simulation validation
        env:
          PYTHONPATH: .
        run: |
          python scripts/run_predictive_backtest.py
          python scripts/run_external_pre_tournament_holdout.py
          python scripts/tune_shared_tempo_and_run_v3.py
          python scripts/run_sensitivity_analysis.py
          python scripts/run_nested_uncertainty.py
          python scripts/build_scientific_status.py
      - name: Build paper and release outputs
        env:
          MPLBACKEND: Agg
        run: |
          python scripts/build_paper_exhibits.py
          python scripts/build_scientific_exhibits.py
          python scripts/build_final_release_package.py
      - name: Archive scientific validation package
        uses: actions/upload-artifact@v4
        with:
          name: scientific-validation-${{ github.run_id }}
          path: |
            data/model_readiness
            data/validation
            data/simulations/calibrated_v0_3
            data/releases/v1_0
            paper
          retention-days: 30
          if-no-files-found: error
      - name: Publish scientific validation outputs
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "synthetic-xi-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/model_readiness data/validation data/simulations/calibrated_v0_3 data/releases/v1_0 paper
          if git diff --cached --quiet; then
            echo "No scientific validation changes to publish"
          else
            git commit -m "science: update selection, validation and release outputs"
            git fetch origin main
            git rebase origin/main
            git push origin HEAD:main
          fi
