name: Engine Validation Gate

on:
  push:
    branches: [definitive-real-vs-ai]
    paths:
      - scripts/scientific/validate_engine_mechanisms.py
      - scripts/scientific/validate_postfreeze_direction.py
      - scripts/scientific/build_engine_validation_gate.py
      - scripts/scientific/build_definitive_experiment_gate.py
      - data/definitive_experiment_v1/team_manifest.json
      - data/definitive_experiment_v1/real_xi.csv
      - data/definitive_experiment_v1/ai_xi.csv
      - .github/workflows/engine-validation-gate.yml
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: definitive-engine-validation
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || 'definitive-real-vs-ai' }}
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile sources
        run: |
          python -m py_compile scripts/scientific/validate_engine_mechanisms.py
          python -m py_compile scripts/scientific/validate_postfreeze_direction.py
          python -m py_compile scripts/scientific/build_engine_validation_gate.py
          python -m py_compile scripts/scientific/build_definitive_experiment_gate.py

      - name: Run controlled mechanism diagnostics
        run: |
          mkdir -p data/audits/engine_validation_v1
          python scripts/scientific/validate_engine_mechanisms.py | tee data/audits/engine_validation_v1/mechanism_execution.log
          echo 0 > data/audits/engine_validation_v1/mechanism_exit_code.txt

      - name: Run independent post-freeze direction check
        run: |
          if [ -f data/definitive_experiment_v1/team_manifest.json ] && [ -f data/definitive_experiment_v1/real_xi.csv ] && [ -f data/definitive_experiment_v1/ai_xi.csv ]; then
            python scripts/scientific/validate_postfreeze_direction.py
          else
            echo 'Frozen teams are not present yet; post-freeze check remains pending.'
          fi

      - name: Build engine and experiment gate status
        run: |
          python scripts/scientific/build_engine_validation_gate.py
          python scripts/scientific/build_definitive_experiment_gate.py

      - name: Upload engine validation
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: engine-validation-${{ github.run_id }}
          path: |
            data/audits/engine_validation_v1/
            data/audits/definitive_experiment_v1/
          if-no-files-found: error
          retention-days: 90

      - name: Publish reproducible validation status
        run: |
          set -euo pipefail
          git config user.name 'synthetic-xi-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -f data/audits/engine_validation_v1/
          git add -f data/audits/definitive_experiment_v1/gate_status.json
          git add -f data/audits/definitive_experiment_v1/README.md
          if git diff --cached --quiet; then
            echo 'No new engine validation outputs to publish.'
            exit 0
          fi
          git commit -m 'science: publish preteam and post-freeze engine validation'
          for attempt in 1 2 3 4 5; do
            git fetch origin definitive-real-vs-ai
            if git rebase -X theirs origin/definitive-real-vs-ai && git push origin HEAD:definitive-real-vs-ai; then
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 5))
          done
          exit 1
