name: Recover Adaptive Extraction Artifact

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/recover-adaptive-artifact.yml"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: adaptive-annual-player-extraction
  cancel-in-progress: false

jobs:
  recover:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas requests

      - name: Download latest failed adaptive raw artifact
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          RUN_ID="$(gh run list \
            --repo "${GITHUB_REPOSITORY}" \
            --workflow adaptive-annual-extraction.yml \
            --status failure \
            --limit 10 \
            --json databaseId,createdAt \
            --jq 'sort_by(.createdAt) | reverse | .[0].databaseId')"
          if [[ -z "${RUN_ID}" || "${RUN_ID}" == "null" ]]; then
            echo "No failed adaptive run found"
            exit 1
          fi
          echo "Recovering workflow run ${RUN_ID}"
          rm -rf recovered
          mkdir -p recovered data/raw/adaptive_annual
          gh run download "${RUN_ID}" \
            --repo "${GITHUB_REPOSITORY}" \
            --name "adaptive-annual-raw-${RUN_ID}" \
            --dir recovered
          find recovered -type f -name 'fixture_*_*.json' -exec cp -f {} data/raw/adaptive_annual/ \;
          COUNT="$(find data/raw/adaptive_annual -type f -name 'fixture_*_*.json' | wc -l | tr -d ' ')"
          echo "Recovered ${COUNT} raw API responses"
          test "${COUNT}" -gt 0

      - name: Reconstruct compact lake without API calls
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          API_MAX_REQUESTS_PER_MINUTE: "190"
          MAX_NETWORK_REQUESTS: "0"
          MIN_DAILY_REQUESTS_REMAINING: "1000000"
          GITHUB_RUN_ID: recovery-${{ github.run_id }}
        run: python scripts/run_adaptive_annual_extraction.py

      - name: Analyze recovered batch
        run: python scripts/analyze_adaptive_extraction.py

      - name: Publish recovered lake batch and state
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "synthetic-xi-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/lake data/audits
          if git diff --cached --quiet; then
            echo "No recovered changes to publish"
          else
            git commit -m "data: recover adaptive annual extraction batch"
            git fetch origin main
            git rebase origin/main
            git push origin HEAD:main
          fi
