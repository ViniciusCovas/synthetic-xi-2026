name: Cached Lake Inventory

on:
  push:
    branches: [main]
    paths:
      - "scripts/scientific/cached_lake_inventory.py"
      - ".github/workflows/cached-lake-inventory.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: synthetic-xi-data-writer
  cancel-in-progress: false

jobs:
  inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas

      - name: Inventory cached sources
        run: python scripts/scientific/cached_lake_inventory.py

      - name: Publish diagnostic outputs
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/audits/cache_reconciliation
          if git diff --cached --quiet; then
            echo "No cache inventory changes to publish."
            exit 0
          fi
          git commit -m "science: publish cached lake inventory"
          for attempt in 1 2 3; do
            git fetch origin main
            if git rebase origin/main && git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort || true
            sleep $((attempt * 5))
          done
          echo "Failed to publish cached lake inventory after retries." >&2
          exit 1
