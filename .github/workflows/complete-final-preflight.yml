name: Complete Final Preflight and World Cup Weather

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - '.github/preflight-trigger/**'

permissions:
  contents: write
  actions: read

concurrency:
  group: complete-final-preflight-v1-1
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Checkout frozen main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pandas numpy requests matplotlib pytest

      - name: Freeze 26-player rosters and match policies
        env:
          PYTHONPATH: .
        run: python scripts/scientific/freeze_complete_final_rosters.py

      - name: Reuse or build World Cup 2026 match-weather record
        env:
          PYTHONPATH: .
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          WORLD_CUP_LEAGUE_ID: '1'
        shell: bash
        run: |
          set -euo pipefail
          if python - <<'PY'
          import json
          from pathlib import Path
          required = [
              Path('data/context/world_cup_2026_weather_by_match.csv'),
              Path('data/context/world_cup_2026_weather_source_manifest.json'),
          ]
          p=Path('data/context/world_cup_2026_weather_summary.json')
          d=json.loads(p.read_text()) if p.exists() else {}
          assert d.get('status') == 'world_cup_2026_weather_record_complete'
          assert d.get('matches_in_record') == 104
          assert float(d.get('weather_coverage', 0)) >= 0.90
          assert float(d.get('reanalysis_coverage', 0)) >= 0.85
          assert d.get('missing_weather_imputed') is False
          assert all(item.exists() and item.stat().st_size > 0 for item in required)
          PY
          then
            echo 'Reusing frozen complete 104-match weather record.'
          else
            python scripts/scientific/build_world_cup_2026_weather_record.py
            python scripts/scientific/repair_world_cup_2026_weather_record.py
          fi

      - name: Reuse or freeze World Cup 2026 event distributions
        env:
          PYTHONPATH: .
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          WORLD_CUP_LEAGUE_ID: '1'
          API_SAFE_REQUESTS_PER_MINUTE: '90'
          MAX_NETWORK_REQUESTS: '30'
          MIN_DAILY_REQUESTS_REMAINING: '30'
          FIXTURE_BUNDLE_SIZE: '20'
          GITHUB_RUN_ID: preflight_${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          if python - <<'PY'
          import json
          from pathlib import Path
          csv=Path('data/context/world_cup_2026_event_benchmark_by_match.csv')
          p=Path('data/context/world_cup_2026_event_benchmark_summary.json')
          d=json.loads(p.read_text()) if p.exists() else {}
          assert d.get('status') == 'world_cup_2026_event_benchmark_complete'
          assert d.get('scheduled_fixtures') == 104
          assert d.get('fixtures_returned_with_bundle') == 104
          assert float(d.get('fixture_coverage', 0)) == 1.0
          assert d.get('model_parameters_changed') is False
          assert csv.exists() and csv.stat().st_size > 0
          PY
          then
            echo 'Reusing frozen complete 104-match event benchmark.'
          else
            python scripts/scientific/build_world_cup_2026_event_benchmark.py
            python scripts/scientific/normalize_world_cup_2026_event_benchmark.py
          fi

      - name: Build neutral Complete Final Engine v1.1 engineering evidence
        if: always()
        id: engineering
        env:
          PYTHONPATH: .
        shell: bash
        run: |
          set +e
          python scripts/scientific/run_complete_final_v1_1_engineering_snapshot.py --simulations 1000
          code=$?
          set -e
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          echo "v1.1 engineering exit code: $code"

      - name: Evaluate core preflight without tuning
        if: always()
        id: core
        env:
          PYTHONPATH: .
        shell: bash
        run: |
          set +e
          python scripts/scientific/validate_complete_final_preflight_v1_1.py
          code=$?
          set -e
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          echo "Core preflight exit code: $code"

      - name: Run isolated 2,000-match validation
        if: steps.core.outputs.exit_code == '0'
        id: validation2000
        env:
          PYTHONPATH: .
        shell: bash
        run: |
          set +e
          python scripts/scientific/run_complete_final_preflight_validation.py
          code=$?
          set -e
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          echo "Validation-2000 exit code: $code"

      - name: Record skipped 2,000 validation when core is blocked
        if: steps.core.outputs.exit_code != '0'
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path
          p=Path('data/model_readiness/complete_final_validation_2000_status.json')
          p.write_text(json.dumps({
            'status':'complete_final_validation_2000_skipped_core_preflight_blocked',
            'generated_at_utc':datetime.now(timezone.utc).isoformat(),
            'engine_version':'complete_final_v1_1_rules_fix',
            'simulations':2000,
            'validation_2000_passed':False,
            'definitive_10000_executed':False,
            'model_parameters_changed':False,
            'rules_implementation_changed':True,
            'selection_thresholds_changed':False,
            'event_tolerances_changed':False
          },indent=2),encoding='utf-8')
          PY

      - name: Restore execution-only expanded engine sources
        if: always()
        shell: bash
        run: |
          git restore --worktree -- \
            simulator/complete_final.py \
            simulator/complete_final_monte_carlo.py \
            simulator/validation.py \
            scripts/run_complete_final_simulation.py \
            scripts/scientific/validate_complete_final.py \
            tests/test_complete_final.py \
            .github/workflows/complete-final-validation.yml \
            COMPLETE_FINAL_IMPLEMENTATION.md 2>/dev/null || true

      - name: Finalize preflight and refresh release gate only
        if: always()
        env:
          PYTHONPATH: .
        shell: bash
        run: |
          set +e
          python scripts/scientific/finalize_complete_final_preflight.py
          final_code=$?
          python scripts/scientific/release_complete_final_when_ready.py --evaluate-only
          release_code=$?
          set -e
          echo "Final preflight exit code: $final_code"
          echo "Release evaluation exit code: $release_code"

      - name: Upload complete preflight audit package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: complete-final-preflight-v1-1-${{ github.run_id }}
          path: |
            config/complete_final_preflight_v1.json
            config/complete_final_preflight_tolerances_v1.json
            config/complete_final_rules_fix_v1_1.json
            data/context/world_cup_2026_*
            data/context/complete_final_preflight_metric_audit.csv
            data/model_readiness/complete_final_rosters_v1.json
            data/model_readiness/complete_final_rules_fix_v1_1_status.json
            data/model_readiness/complete_final_preflight_status.json
            data/model_readiness/complete_final_validation_2000_status.json
            data/simulations/complete_final_v1_1
            COMPLETE_FINAL_RULES_FIX_V1_1.md
          retention-days: 90
          if-no-files-found: warn

      - name: Publish frozen evidence and gates
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'synthetic-xi-bot'
          git config user.email 'actions@users.noreply.github.com'
          evidence_paths=(
            data/context/world_cup_2026_fixture_schedule_raw.json
            data/context/world_cup_2026_weather_by_match.csv
            data/context/world_cup_2026_weather_summary.json
            data/context/world_cup_2026_weather_source_manifest.json
            data/context/world_cup_2026_event_benchmark_by_match.csv
            data/context/world_cup_2026_event_benchmark_summary.json
            data/context/complete_final_preflight_metric_audit.csv
            data/model_readiness/complete_final_rosters_v1.json
            data/model_readiness/complete_final_rules_fix_v1_1_status.json
            data/model_readiness/complete_final_preflight_status.json
            data/model_readiness/complete_final_validation_2000_status.json
            data/simulations/complete_final_v1_1/engineering_validation_snapshot.json
            data/simulations/complete_final_v1_1/engineering_build.log
            data/simulations/complete_final_v1_1/validation_report.json
            data/simulations/complete_final_v1_1/release_gate_status.json
          )
          for path in "${evidence_paths[@]}"; do
            if [[ -e "$path" ]]; then
              git add -- "$path"
            fi
          done

          mapfile -t unstaged_tracked < <(git diff --name-only)
          if [[ "${#unstaged_tracked[@]}" -gt 0 ]]; then
            git restore --worktree -- "${unstaged_tracked[@]}"
          fi

          if git diff --cached --quiet; then
            echo 'No preflight evidence changes to publish.'
            exit 0
          fi
          git commit -m 'science: freeze Complete Final Engine v1.1 preflight evidence'

          if [[ -n "$(git status --porcelain=v1)" ]]; then
            git stash push --include-untracked -m "complete-final-preflight-v1-1-transient-${GITHUB_RUN_ID}" >/dev/null || true
          fi
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            if git rebase -X theirs origin/main && git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            git reset --hard HEAD >/dev/null 2>&1 || true
            sleep $((attempt * 4))
          done
          exit 1

      - name: Report authorization state
        if: always()
        run: |
          python - <<'PY'
          from pathlib import Path
          for path in [
            'data/model_readiness/complete_final_preflight_status.json',
            'data/model_readiness/complete_final_validation_2000_status.json',
            'data/simulations/complete_final_v1_1/release_gate_status.json'
          ]:
            p=Path(path)
            print(f'--- {path} ---')
            print(p.read_text() if p.exists() else 'missing')
          PY
