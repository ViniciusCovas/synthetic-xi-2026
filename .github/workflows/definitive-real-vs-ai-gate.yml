name: Definitive Real XI vs AI XI Gate

on:
  push:
    branches: [definitive-real-vs-ai]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: definitive-real-vs-ai-gate
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || 'definitive-real-vs-ai' }}
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install, compile and test
        run: |
          pip install -r requirements.txt pytest
          python -m py_compile simulator/ai_xi_generator.py
          python -m py_compile scripts/scientific/audit_complete_lineups_v3.py
          python -m py_compile scripts/scientific/audit_external_validity_v2.py
          python -m py_compile scripts/scientific/build_blind_position_review_packet_v3.py
          python -m py_compile scripts/scientific/evaluate_blind_position_review_v3.py
          python -m py_compile scripts/scientific/build_definitive_experiment_gate.py
          python -m py_compile scripts/scientific/build_definitive_teams.py
          pytest -q tests/test_ai_xi_generator.py

      - name: Evaluate current scientific gates
        run: |
          python scripts/scientific/evaluate_blind_position_review_v3.py
          python scripts/scientific/audit_external_validity_v2.py
          python scripts/scientific/build_definitive_experiment_gate.py
          python - <<'PY'
          import json
          from pathlib import Path
          status = json.loads(Path('data/audits/definitive_experiment_v1/gate_status.json').read_text())
          assert status['partial_identification_allowed'] is False
          assert status['estimand'] == 'one deterministic Real XI versus one deterministic AI XI'
          if not status['design_gate_passed']:
              assert not status['final_team_files_allowed']
          if not status['final_experiment_gate_passed']:
              assert not status['final_simulation_allowed']
              assert not status['global_best_xi_publication_allowed']
          PY

      - name: Upload public forms and gate status
        uses: actions/upload-artifact@v4
        with:
          name: definitive-real-vs-ai-${{ github.run_id }}
          path: |
            data/audits/position_ontology_v3/blind_review/reviewer_a_form.csv
            data/audits/position_ontology_v3/blind_review/reviewer_b_form.csv
            data/audits/position_ontology_v3/blind_review/REVIEW_INSTRUCTIONS_PT.md
            data/audits/position_ontology_v3/blind_review/packet_manifest.json
            data/audits/position_ontology_v3/blind_review/blind_review_evaluation.json
            data/audits/external_validity_v2/
            data/audits/definitive_experiment_v1/
            POSITION_ONTOLOGY_CODEBOOK_ES.md
            SCIENTIFIC_VALIDITY_NOTICE.md
          if-no-files-found: warn
          retention-days: 90

      - name: Publish post-result validity state
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          git config user.name 'synthetic-xi-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -f data/audits/external_validity_v2/
          git add -f data/audits/definitive_experiment_v1/gate_status.json
          git add -f data/audits/definitive_experiment_v1/README.md
          if git diff --cached --quiet; then
            echo 'No gate changes to publish.'
            exit 0
          fi
          git commit -m 'science: close global-best-XI gate after external validity audit'
          for attempt in 1 2 3 4 5; do
            git fetch origin definitive-real-vs-ai
            if git rebase -X theirs origin/definitive-real-vs-ai && git push origin HEAD:definitive-real-vs-ai; then
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 5))
          done
          exit 1
