name: Definitive Real XI vs AI XI Gate

on:
  push:
    branches: [definitive-real-vs-ai]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PYTHONPATH: .
      SNAPSHOT: 08276007a68a923294e0aea44fb2e8dbbd553021
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || 'definitive-real-vs-ai' }}
          fetch-depth: 0
          persist-credentials: true

      - name: Restore ontology audit snapshot
        run: |
          mkdir -p data/audits/position_ontology_v2
          git show "$SNAPSHOT:data/audits/position_ontology_v2/player_position_audit.csv" > data/audits/position_ontology_v2/audited_player_roles.csv
          git show "$SNAPSHOT:data/audits/position_ontology_v2/position_ontology_audit_status.json" > data/audits/position_ontology_v2/ontology_audit_status.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install and test
        run: |
          pip install -r requirements.txt pytest
          python -m py_compile simulator/ai_xi_generator.py
          python -m py_compile scripts/scientific/build_definitive_experiment_gate.py
          python -m py_compile scripts/scientific/build_blind_position_review_packet.py
          python -m py_compile scripts/scientific/evaluate_blind_position_review.py
          pytest -q tests/test_ai_xi_generator.py

      - name: Build review packet and hard gate
        run: |
          python scripts/scientific/build_blind_position_review_packet.py
          python scripts/scientific/evaluate_blind_position_review.py
          rm -f data/audits/position_ontology_v2/blind_review/answer_key_do_not_share_with_reviewers.csv
          python scripts/scientific/build_definitive_experiment_gate.py
          python - <<'PY'
          import json
          from pathlib import Path
          s=json.loads(Path('data/audits/definitive_experiment_v1/gate_status.json').read_text())
          assert s['partial_identification_allowed'] is False
          if not s['final_experiment_gate_passed']:
              assert not s['final_simulation_allowed']
          PY

      - name: Upload forms and gate
        uses: actions/upload-artifact@v4
        with:
          name: definitive-real-vs-ai-${{ github.run_id }}
          path: |
            data/audits/position_ontology_v2/blind_review/reviewer_a_form.csv
            data/audits/position_ontology_v2/blind_review/reviewer_b_form.csv
            data/audits/position_ontology_v2/blind_review/REVIEW_INSTRUCTIONS_ES.md
            data/audits/position_ontology_v2/blind_review/packet_manifest.json
            data/audits/definitive_experiment_v1/
            POSITION_ONTOLOGY_CODEBOOK_ES.md
          if-no-files-found: error
          retention-days: 90
