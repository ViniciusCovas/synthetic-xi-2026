name: Full Lineup Priority Extraction

on:
  push:
    branches: [definitive-real-vs-ai]
    paths:
      - scripts/scientific/extract_full_lineups_priority.py
      - scripts/scientific/extract_full_lineups_deficit_roles.py
      - .github/workflows/full-lineup-priority-extraction.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: full-lineup-priority-extraction
  cancel-in-progress: false

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PYTHONPATH: .
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      MAX_NETWORK_REQUESTS: '800'
      MIN_DAILY_REQUESTS_REMAINING: '500'
      API_MAX_REQUESTS_PER_MINUTE: '175'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: definitive-real-vs-ai
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Extract complete lineups for deficient primary roles
        run: |
          test -n "$API_FOOTBALL_KEY"
          python -m py_compile scripts/scientific/audit_complete_lineups_v3.py
          python -m py_compile scripts/scientific/extract_full_lineups_priority.py
          python -m py_compile scripts/scientific/extract_full_lineups_deficit_roles.py
          python -m py_compile scripts/scientific/build_blind_position_review_packet_v3.py
          python scripts/scientific/audit_complete_lineups_v3.py
          python scripts/scientific/extract_full_lineups_deficit_roles.py
          python scripts/scientific/audit_complete_lineups_v3.py
          python scripts/scientific/build_blind_position_review_packet_v3.py

      - name: Protect frozen diagnostic release
        run: |
          if git diff --name-only | grep -E '^data/simulations/identified_set_v1/'; then
            echo 'Frozen diagnostic simulation changed unexpectedly.' >&2
            exit 1
          fi

      - name: Upload public extraction and review package
        uses: actions/upload-artifact@v4
        with:
          name: full-lineup-priority-${{ github.run_id }}
          path: |
            data/lake/batches/batch_full_provider_lineups.csv.gz
            data/lake/full_lineup_extraction_progress.csv
            data/audits/position_ontology_v3/full_lineup_extraction_status.json
            data/audits/position_ontology_v3/lineup_completeness_status.json
            data/audits/position_ontology_v3/complete_lineup_player_role_minutes.csv
            data/audits/position_ontology_v3/complete_lineup_primary_roles.csv
            data/audits/position_ontology_v3/blind_review/reviewer_a_form.csv
            data/audits/position_ontology_v3/blind_review/reviewer_b_form.csv
            data/audits/position_ontology_v3/blind_review/REVIEW_INSTRUCTIONS_PT.md
            data/audits/position_ontology_v3/blind_review/packet_manifest.json
          if-no-files-found: warn
          retention-days: 90

      - name: Upload internal answer key
        if: ${{ hashFiles('data/audits/position_ontology_v3/blind_review/answer_key_do_not_share_with_reviewers.csv') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ontology-v3-internal-key-${{ github.run_id }}
          path: data/audits/position_ontology_v3/blind_review/answer_key_do_not_share_with_reviewers.csv
          if-no-files-found: error
          retention-days: 90

      - name: Publish durable recovered lineups
        run: |
          set -euo pipefail
          git config user.name 'synthetic-xi-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -f data/lake/batches/batch_full_provider_lineups.csv.gz
          git add -f data/lake/full_lineup_extraction_progress.csv
          git add -f data/audits/position_ontology_v3/full_lineup_extraction_status.json
          git add -f data/audits/position_ontology_v3/lineup_completeness_status.json
          git add -f data/audits/position_ontology_v3/complete_lineup_player_role_minutes.csv
          git add -f data/audits/position_ontology_v3/complete_lineup_primary_roles.csv
          if git diff --cached --quiet; then
            echo 'No new complete lineups to publish.'
            exit 0
          fi
          git commit -m 'data: publish complete provider lineups for ontology v3'
          for attempt in 1 2 3 4 5; do
            git fetch origin definitive-real-vs-ai
            if git rebase -X theirs origin/definitive-real-vs-ai && git push origin HEAD:definitive-real-vs-ai; then
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 5))
          done
          exit 1
